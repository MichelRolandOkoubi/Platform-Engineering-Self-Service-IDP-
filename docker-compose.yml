version: '3.8'

services:
  control-plane:
    build:
      context: ./control-plane
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development

  ml-cost-engine:
    build:
      context: ./ml-cost-engine
    ports:
      - "8000:8000"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
