apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: idp-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      containers:
      - name: control-plane
        image: idp/control-plane:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: idp-system
spec:
  selector:
    app: control-plane
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
