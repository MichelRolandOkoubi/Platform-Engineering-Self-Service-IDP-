apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: idp-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/idp-platform/idp-platform.git
    targetRevision: HEAD
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: idp-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
